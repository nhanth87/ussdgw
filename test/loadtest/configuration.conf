# ============================================================
# USSD Gateway Test Lab Configuration - 4G @ 10k TPS
# ============================================================

[general]
mode = client
protocol = http
target_tps = 10000
duration_seconds = 300
warmup_seconds = 30

[jvm]
# JVM tuning for 10k TPS
heap_size = 8g
gc_type = G1GC
max_gc_pause = 20
use_string_deduplication = true

# JVM Options String:
# -XX:+UseG1GC -Xms8g -Xmx8g -XX:MaxGCPauseMillis=20 
# -XX:+UnlockExperimentalVMOptions -XX:+UseStringDeduplication
# -XX:+UseLargePages -XX:LargePageSizeInBytes=2m

[http_client]
# HTTP load generator settings
base_url = http://localhost:8080/ussdhttpdemo/
worker_threads = 40
max_concurrent = 50000
connection_pool_size = 100
connect_timeout_ms = 5000
read_timeout_ms = 30000
write_timeout_ms = 5000

[ss7_stack]
# SS7 stack configuration for real 4G testing
local_spc = 1
remote_spc = 2
local_ip = 192.168.1.10
remote_ip = 192.168.1.20
local_port = 2905
remote_port = 2906
ssn = 8

# SCTP tuning
sctp_sndbuf = 4194304
sctp_rcvbuf = 4194304
sctp_nodelay = true
sctp_streams = 16

[tcap_map]
# TCAP/MAP dialog tuning
max_dialogs = 2000000
dialog_timeout_ms = 30000
invoke_timeout_ms = 15000

[load_generator]
# Load pattern
ramp_up_seconds = 60
steady_state_seconds = 180
ramp_down_seconds = 60

# USSD messages to test
ussd_messages = *100#,*101#,*102#,*888#
msisdn_prefix = 8490
msisdn_range = 1000000

[metrics]
# Metrics collection
report_interval_seconds = 5
latency_percentiles = 50,95,99,99.9
output_format = console,csv
output_directory = ./results

[os_tuning_linux]
# Linux kernel tuning (run as root)
net_core_rmem_max = 16777216
net_core_wmem_max = 16777216
net_ipv4_tcp_rmem = 4096 87380 16777216
net_ipv4_tcp_wmem = 4096 65536 16777216
net_core_netdev_max_backlog = 65536
net_ipv4_tcp_max_syn_backlog = 65536
ulimit_nofile = 200000

[network]
# Network interface tuning
interface = eth0
txqueuelen = 10000
mtu = 9000

[4g_specific]
# 4G/LTE specific settings
# In 4G, USSD goes via SGs interface (MME <-> MSC)
# MAP over SIGTRAN (M3UA/SCTP)
use_m3ua = true
m3ua_asp_id = 1
m3ua_routing_context = 100
m3ua_network_appearance = 0

# Diameter interface for 4G (if using Diameter-based USSD)
diameter_enabled = false
diameter_realm = localdomain
diameter_host = ussdgw01
